<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Codex 使用情境圖鑑 · Codex Use Cases</title>
  <meta name="description" content="OpenAI Codex 全部使用情境的中英對照互動圖鑑 · An interactive bilingual (中/EN) gallery of every OpenAI Codex use case." />

  <!-- Open Graph -->
  <meta property="og:title" content="Codex 使用情境圖鑑 · Codex Use Cases" />
  <meta property="og:description" content="OpenAI Codex 全部使用情境的中英對照互動圖鑑。" />
  <meta property="og:type" content="website" />

  <!-- Fonts: Material Design 3 (Roboto / Roboto Flex / Material Symbols) + 繁中 Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Flex:opsz,wght@8..144,400..700&family=Roboto+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b57d0'/><text x='50' y='68' font-size='56' text-anchor='middle' fill='white' font-family='monospace'>&gt;_</text></svg>" />
</head>
<body>
  <!-- Top app bar -->
  <header class="appbar">
    <div class="appbar__brand">
      <span class="brand-mark"><span class="material-symbols-rounded">terminal</span></span>
      <span>
        <span data-i18n="brand">Codex 使用情境圖鑑</span><br />
        <span class="brand-sub" data-i18n="brandSub">52 個情境 · 中英對照</span>
      </span>
    </div>

    <div class="seg" role="group" aria-label="Language">
      <button id="lang-zh" data-lang="zh" aria-pressed="true"><span class="lbl">中文</span></button>
      <button id="lang-en" data-lang="en" aria-pressed="false"><span class="lbl">EN</span></button>
    </div>
    <button class="icon-btn ripple-host" id="theme-toggle" aria-label="Toggle theme" title="切換深淺色">
      <span class="material-symbols-rounded" id="theme-icon">dark_mode</span>
    </button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <span class="hero__eyebrow"><span class="dot"></span><span data-i18n="eyebrow">取材自 OpenAI 官方文件</span></span>
    <h1 data-i18n-html="heroTitle">用 <span class="grad">Codex</span> 能做的每一件事</h1>
    <p data-i18n="heroDesc">把 OpenAI 官方的全部 Codex 使用情境整理成一份可互動、可搜尋的中英對照圖鑑。點開任一張卡片，看它怎麼用、適合什麼時候用，以及可以照抄的範例 prompt。</p>
    <div class="hero__stats">
      <div class="hero__stat"><b id="stat-total">52</b><span data-i18n="statCases">使用情境</span></div>
      <div class="hero__stat"><b id="stat-cats">8</b><span data-i18n="statCats">分類領域</span></div>
      <div class="hero__stat"><b>2</b><span data-i18n="statLang">語言對照</span></div>
    </div>
  </section>

  <!-- Controls -->
  <section class="controls">
    <div class="search ripple-host">
      <span class="material-symbols-rounded">search</span>
      <input id="search" type="search" autocomplete="off" />
      <button class="icon-btn search__clear" id="search-clear" aria-label="Clear">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div class="chips" id="chips" role="group" aria-label="Categories"></div>
  </section>

  <!-- Card grid -->
  <main class="grid" id="grid" aria-live="polite"></main>

  <footer class="site-foot">
    <p data-i18n-html="footer">內容整理自 <a href="https://developers.openai.com/codex/use-cases" target="_blank" rel="noopener">OpenAI Codex Use Cases</a>。本頁為非官方的中英對照學習用整理。</p>
  </footer>

  <!-- Detail dialog -->
  <div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-labelledby="dlg-title" hidden>
    <div class="dialog" id="dialog"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="data/use-cases.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
